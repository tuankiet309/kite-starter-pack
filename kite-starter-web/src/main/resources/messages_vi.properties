# ============================================================
# Kite Starter - Default Messages (Vietnamese)
# ============================================================

# --- CommonErrorCode ---
BAD_REQUEST=Yêu cầu không hợp lệ.
INVALID_PARAMETER=Một hoặc nhiều tham số không hợp lệ.
MISSING_PARAMETER=Thiếu tham số bắt buộc.
UNAUTHORIZED=Bạn cần đăng nhập để truy cập tài nguyên này.
TOKEN_EXPIRED=Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.
TOKEN_INVALID=Token không hợp lệ.
FORBIDDEN=Bạn không có quyền thực hiện thao tác này.
ACCESS_DENIED=Truy cập bị từ chối.
NOT_FOUND=Không tìm thấy tài nguyên yêu cầu.
RESOURCE_NOT_FOUND=Không tìm thấy tài nguyên.
INTERNAL_SERVER_ERROR=Đã xảy ra lỗi không mong muốn. Vui lòng thử lại sau.
SERVICE_UNAVAILABLE=Dịch vụ tạm thời không khả dụng. Vui lòng thử lại sau.

# ============================================================
# App-specific error codes go in YOUR project's messages_vi.properties
# Example (iam-service):
#   USER_NOT_FOUND=Không tìm thấy người dùng với ID {0}.
#   EMAIL_ALREADY_EXISTS=Địa chỉ email {0} đã được đăng ký.
#   ACCOUNT_LOCKED=Tài khoản của bạn đã bị khóa đến {0}. Vui lòng liên hệ hỗ trợ.
# ============================================================
