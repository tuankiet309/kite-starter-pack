# ============================================================
# Kite Starter - Default Messages (English)
# ============================================================
# Keys here match ErrorCode.getCode() values.
# Override in your app by creating your own messages.properties
# in src/main/resources/ - Spring will merge the bundles.
# ============================================================

# --- CommonErrorCode ---
BAD_REQUEST=Bad request.
INVALID_PARAMETER=One or more parameters are invalid.
MISSING_PARAMETER=A required parameter is missing.
UNAUTHORIZED=You must be logged in to access this resource.
TOKEN_EXPIRED=Your session has expired. Please log in again.
TOKEN_INVALID=The provided token is invalid.
FORBIDDEN=You do not have permission to perform this action.
ACCESS_DENIED=Access denied.
NOT_FOUND=The requested resource was not found.
RESOURCE_NOT_FOUND=Resource not found.
INTERNAL_SERVER_ERROR=An unexpected error occurred. Please try again later.
SERVICE_UNAVAILABLE=The service is temporarily unavailable. Please try again later.

# ============================================================
# App-specific error codes go in YOUR project's messages.properties
# Example (iam-service):
#   USER_NOT_FOUND=User with ID {0} does not exist.
#   EMAIL_ALREADY_EXISTS=The email address {0} is already registered.
#   ACCOUNT_LOCKED=Your account has been locked until {0}. Please contact support.
# ============================================================
